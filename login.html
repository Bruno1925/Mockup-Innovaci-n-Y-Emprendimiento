<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PymeConecta - Ingresar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen fade-in">

    <nav class="bg-blue-900 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-wider">PymeConecta</a>
            <div class="space-x-6 text-sm font-medium">
                <a href="tiendas.html" class="hover:text-blue-300 transition">Ver Tiendas</a>
                <a href="registro.html" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-md transition shadow">Registrar Pyme</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100 w-full max-w-md">
            <h1 class="text-2xl font-bold mb-6 text-center text-gray-900">Iniciar Sesión</h1>
            <form action="dashboard.html">
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">Usuario o Correo:</label>
                    <input type="text" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 font-bold mb-2">Contraseña:</label>
                    <input type="password" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-200">
                    Ingresar al Panel
                </button>
            </form>
            <div class="mt-6 text-center text-sm text-gray-500">
                <p>¿No tienes tu tienda aún? <a href="registro.html" class="text-blue-600 hover:underline">Regístrate aquí</a></p>
                <p class="mt-2 text-xs">Protegido mediante control de acceso basado en roles (RBAC)</p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 text-center py-4 text-sm mt-auto">
        &copy; 2026 PymeConecta
    </footer>
</body>
</html>
