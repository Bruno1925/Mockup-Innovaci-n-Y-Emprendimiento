<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PymeConecta - Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen fade-in">

    <nav class="bg-blue-900 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-wider">PymeConecta</a>
            <div class="space-x-6 text-sm font-medium">
                <a href="tiendas.html" class="hover:text-blue-300 transition">Ver Tiendas</a>
                <a href="registro.html" class="hover:text-blue-300 transition">Ayuda</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-2xl mx-auto w-full p-6 mt-8">
        
        <!-- Toast de Éxito-->
        <div id="successToast" class="hidden bg-green-100 border-l-4 border-green-500 text-green-800 p-4 mb-6 rounded shadow-md transition-all">
            <h3 class="font-bold text-lg">Registro Exitoso</h3>
            <p>Pyme registrada con éxito en PymeConecta. Redirigiendo a su Dashboard de Inventario...</p>
        </div>

        <h1 class="text-3xl font-bold mb-8 text-center border-b pb-4">Registro de nueva Pyme</h1>
        
        <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100">
            <form id="registroForm">
                <div class="mb-5">
                    <label class="block text-gray-700 font-bold mb-2">Nombre de Usuario:</label>
                    <input type="text" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div class="mb-5">
                    <label class="block text-gray-700 font-bold mb-2">Nombre Comercial de la Pyme:</label>
                    <input type="text" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="mb-8">
                    <label class="block text-gray-700 font-bold mb-2">RUT Comercial de la Pyme:</label>
                    <input type="text" placeholder="22.XXX.XXX-X" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <button id="btnRegistrar" type="submit" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-200 flex justify-center items-center">
                    <span id="btnText">Registrar Pyme</span>
                    <svg id="btnSpinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-8 text-sm text-gray-500 border-t pt-4">
                <p class="font-bold text-gray-700 mb-2">INFORMACION:</p>
                <p class="border-b border-dashed border-gray-300 pb-1 mb-1">Cifrado de extremo a extremo.</p>
                <p class="border-b border-dashed border-gray-300 pb-1 mb-1">Aislamiento por control de roles (RBAC).</p>
                <p class="border-b border-dashed border-gray-300 pb-1 mb-1">Integración nativa con FLOW.</p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 text-center py-4 text-sm mt-auto">
        &copy; 2026 PymeConecta
    </footer>

    <!-- Importar lógica -->
    <script src="app.js"></script>
</body>
</html>
